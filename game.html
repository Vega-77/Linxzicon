<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linxicon — Play</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        /* Full-height layout so the canvas fills the viewport */
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .game-wrap {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 10px 14px 10px;
            gap: 8px;
            min-height: 0;
        }

        /* ── Info bar ── */
        .game-info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: var(--radius);
            padding: 10px 20px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .target-words {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.05rem;
            font-weight: 700;
        }
        .word-tag {
            padding: 6px 16px;
            border-radius: 8px;
            background: var(--bg3);
            letter-spacing: 0.03em;
        }
        .word-tag.start, .word-tag.end {
            color: var(--gold);
            border: 1px solid rgba(245,158,11,0.5);
            background: rgba(245,158,11,0.08);
        }
        .arrow { color: var(--text-muted); font-size: 1.1rem; }
        .info-right { display: flex; gap: 20px; align-items: center; }
        .word-count-pill {
            background: var(--bg3);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .word-count-pill strong { color: var(--text); }
        .timer {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            min-width: 60px;
            text-align: right;
        }

        /* ── Opponent bar ── */
        #opponent-bar {
            display: none;
            background: linear-gradient(90deg, rgba(79,70,229,0.12), transparent);
            border: 1px solid rgba(79,70,229,0.3);
            border-radius: var(--radius);
            padding: 8px 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        #opponent-bar.visible { display: flex; align-items: center; gap: 10px; }
        #opponent-bar strong { color: var(--text); }
        .opp-words-badge {
            margin-left: auto;
            background: var(--bg3);
            border-radius: 12px;
            padding: 2px 12px;
            font-size: 0.8rem;
        }

        /* ── Canvas — fills remaining space ── */
        .canvas-wrapper {
            position: relative;
            flex: 1;
            min-height: 0;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--bg3);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Win overlay */
        .win-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15,23,42,0.88);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            border-radius: var(--radius);
        }
        .win-overlay.visible { display: flex; }
        .win-overlay h2 { font-size: 2.2rem; color: var(--green); }
        .win-overlay p  { color: var(--text-muted); font-size: 1.05rem; }
        .win-overlay .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

        /* ── Word input ── */
        .word-input-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .word-input-row input {
            flex: 1;
            font-size: 1rem;
            padding: 12px 16px;
        }
        .word-input-row .btn { padding: 12px 24px; font-size: 1rem; }

        /* ── Status ── */
        #status-msg {
            font-size: 0.875rem;
            min-height: 18px;
            text-align: center;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        #status-msg.error   { color: var(--red); }
        #status-msg.success { color: var(--green); }
        #status-msg.info    { color: #a5b4fc; }

        /* ── Matchmaking ── */
        #matchmaking-screen {
            display: none;
            flex: 1;
            align-items: center;
            justify-content: center;
        }
        #matchmaking-screen.active { display: flex; }
        .match-card {
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 380px;
            width: 100%;
        }
        .match-card h2 { margin-bottom: 8px; }
        .match-card p  { color: var(--text-muted); margin-bottom: 28px; }
    </style>
</head>
<body>

<!-- Nav -->
<nav class="navbar">
    <span class="navbar-brand">Linxicon</span>
    <div class="navbar-links">
        <span id="mode-badge" class="muted" style="font-size:0.85rem;"></span>
        <button class="btn btn-ghost" id="back-btn" style="padding:6px 14px;">← Lobby</button>
    </div>
</nav>

<!-- ══ MATCHMAKING ══ -->
<div id="matchmaking-screen">
    <div class="match-card">
        <div class="spinner" style="margin:0 auto 20px;"></div>
        <h2>Finding a match…</h2>
        <p id="matchmaking-msg">Searching for an opponent at your rating.</p>
        <button class="btn btn-ghost btn-full" id="cancel-search-btn">Cancel</button>
    </div>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen" style="display:none; flex:1; flex-direction:column; min-height:0;">
<div class="game-wrap">

    <!-- Info bar -->
    <div class="game-info-bar">
        <div class="target-words">
            <span class="word-tag start" id="start-word-tag">—</span>
            <span class="arrow">→</span>
            <span class="word-tag end"   id="end-word-tag">—</span>
        </div>
        <div class="info-right">
            <div class="word-count-pill">Words: <strong id="word-count">2</strong></div>
            <div class="timer" id="timer">0:00</div>
        </div>
    </div>

    <!-- Opponent bar (multiplayer only) -->
    <div id="opponent-bar">
        <span>⚔️ vs <strong id="opponent-name">—</strong></span>
        <span class="opp-words-badge">Their words: <strong id="opponent-word-count">0</strong></span>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper">
        <canvas id="game-canvas"></canvas>

        <div class="win-overlay" id="win-overlay">
            <h2 id="win-title">You connected them! 🎉</h2>
            <p  id="win-details"></p>
            <div class="btn-row">
                <button class="btn btn-success" id="play-again-btn">Play Again</button>
                <button class="btn btn-ghost"   id="go-lobby-btn">Lobby</button>
            </div>
        </div>
    </div>

    <!-- Word input -->
    <div class="word-input-row">
        <input type="text" id="word-input"
               placeholder="Type a connecting word and press Enter…"
               autocomplete="off" autocorrect="off" spellcheck="false" />
        <button class="btn btn-primary" id="submit-word-btn">Add Word</button>
    </div>

    <!-- Status -->
    <div id="status-msg"></div>

</div>
</div>

<script type="module">
    import { requireAuth }        from "./js/auth.js";
    import { loadGlove }          from "./js/glove.js";
    import { Graph }              from "./js/graph.js";
    import { Renderer }           from "./js/render.js";
    import { GameSession }        from "./js/game.js";
    import { MultiplayerSession } from "./js/multiplayer.js";

    // ── Mode ──
    const params = new URLSearchParams(window.location.search);
    const mode   = params.get("mode") === "multi" ? "multi" : "solo";
    document.getElementById("mode-badge").textContent =
        mode === "multi" ? "⚔️ Multiplayer" : "🧩 Solo";

    await requireAuth();
    await loadGlove("game/data/embeddings.bin");

    // ── Canvas sizing — fill the wrapper ──
    const canvas  = document.getElementById("game-canvas");
    const wrapper = canvas.parentElement;
    function resizeCanvas() {
        canvas.width  = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const graph    = new Graph();
    const renderer = new Renderer(canvas, graph);

    // ── Helpers ──
    function setStatus(text, type = "") {
        const el = document.getElementById("status-msg");
        el.textContent = text;
        el.className   = type;
    }

    function refreshWordCount() {
        document.getElementById("word-count").textContent =
            gameSession.graph.wordCount;
    }

    let timerInterval = null;
    let timerSeconds  = 0;

    function startTimer() {
        timerSeconds = 0;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSeconds++;
            const m = Math.floor(timerSeconds / 60);
            const s = String(timerSeconds % 60).padStart(2, "0");
            document.getElementById("timer").textContent = `${m}:${s}`;
        }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); }

    function fmtTime(s) { return s < 60 ? `${s}s` : `${Math.floor(s/60)}m ${s%60}s`; }

    function showOverlay(title, details) {
        stopTimer();
        document.getElementById("win-title").textContent   = title;
        document.getElementById("win-details").textContent = details;
        document.getElementById("win-overlay").classList.add("visible");
    }

    // ── Word submit (shared) ──
    let gameSession;
    let activeSubmit;

    async function handleSubmit() {
        const input = document.getElementById("word-input");
        const word  = input.value.trim();
        input.value = "";
        input.focus();
        if (!word) return;

        const result = await activeSubmit(word);

        if (result.error) { setStatus(result.error, "error"); return; }

        refreshWordCount();

        if (result.connections.length === 0) {
            setStatus(`"${result.added}" added — no connections yet.`);
        } else {
            setStatus(
                `"${result.added}" links to: ${result.connections.join(", ")}`,
                "success"
            );
        }
    }

    document.getElementById("submit-word-btn").addEventListener("click", handleSubmit);
    document.getElementById("word-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleSubmit();
    });

    // ════════════════ SOLO ════════════════
    if (mode === "solo") {
        document.getElementById("game-screen").style.cssText = "display:flex;flex:1;flex-direction:column;min-height:0;";

        gameSession = new GameSession(canvas, renderer,
            async (wordsAdded, solveTime) => {
                showOverlay("You connected them! 🎉",
                    `${wordsAdded} word${wordsAdded !== 1 ? "s" : ""} · ${fmtTime(solveTime)}`);
                await gameSession.saveResult(true, null);
            },
            (msg) => setStatus(msg, "info")
        );
        activeSubmit = (w) => gameSession.submitWord(w);

        const { startWord, endWord } = gameSession.init();
        document.getElementById("start-word-tag").textContent = startWord;
        document.getElementById("end-word-tag").textContent   = endWord;
        startTimer();

    // ════════════════ MULTIPLAYER ════════════════
    } else {
        document.getElementById("matchmaking-screen").classList.add("active");

        gameSession = new GameSession(canvas, renderer, () => {},
            (msg) => setStatus(msg, "info")
        );

        const multiSession = new MultiplayerSession(
            renderer, gameSession,

            ({ startWord, endWord, opponentName }) => {
                document.getElementById("matchmaking-screen").classList.remove("active");
                document.getElementById("game-screen").style.cssText =
                    "display:flex;flex:1;flex-direction:column;min-height:0;";

                document.getElementById("start-word-tag").textContent = startWord;
                document.getElementById("end-word-tag").textContent   = endWord;
                document.getElementById("opponent-bar").classList.add("visible");
                document.getElementById("opponent-name").textContent  = opponentName;

                refreshWordCount();
                startTimer();
                setStatus(`Connect "${startWord}" → "${endWord}"`);
            },

            (word) => {
                const el = document.getElementById("opponent-word-count");
                el.textContent = parseInt(el.textContent || "0") + 1;
                setStatus(`Opponent added: "${word}"`, "info");
            },

            async ({ won, opponentElo }) => {
                if (won) {
                    showOverlay("You connected them! 🎉",
                        `${gameSession.wordsAdded} word${gameSession.wordsAdded !== 1 ? "s" : ""} · ${fmtTime(gameSession.getElapsed())}`);
                } else {
                    showOverlay("Opponent won 😔", "Better luck next time!");
                    await gameSession.saveResult(false, opponentElo);
                }
            },

            (msg) => { document.getElementById("matchmaking-msg").textContent = msg; }
        );

        activeSubmit = (w) => multiSession.submitWord(w);
        multiSession.findMatch();

        document.getElementById("cancel-search-btn").addEventListener("click", async () => {
            await multiSession.cancelSearch();
            window.location.href = "lobby.html";
        });

        window.addEventListener("beforeunload", () => multiSession.cleanup());
    }

    document.getElementById("back-btn").addEventListener("click",
        () => { window.location.href = "lobby.html"; });
    document.getElementById("go-lobby-btn").addEventListener("click",
        () => { window.location.href = "lobby.html"; });
    document.getElementById("play-again-btn").addEventListener("click",
        () => { window.location.reload(); });
</script>
</body>
</html>

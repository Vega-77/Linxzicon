<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linxicon — Play</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
        }

        /* game-wrap fills all space below the navbar */
        .game-wrap {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 10px 14px;
            gap: 8px;
            min-height: 0;
        }

        /* ── Info bar ── */
        .game-info-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: var(--radius);
            padding: 10px 20px;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .target-words {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.05rem;
            font-weight: 700;
        }
        .word-tag {
            padding: 6px 16px;
            border-radius: 8px;
            background: var(--bg3);
            letter-spacing: 0.03em;
        }
        .word-tag.start, .word-tag.end {
            color: var(--gold);
            border: 1px solid rgba(245,158,11,0.5);
            background: rgba(245,158,11,0.08);
        }
        .arrow { color: var(--text-muted); font-size: 1.1rem; }
        .info-right { display: flex; gap: 20px; align-items: center; }
        .word-count-pill {
            background: var(--bg3);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .word-count-pill strong { color: var(--text); }
        .timer {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
            min-width: 60px;
            text-align: right;
        }

        /* ── Opponent bar (multiplayer only) ── */
        #opponent-bar {
            display: none;
            background: linear-gradient(90deg, rgba(79,70,229,0.12), transparent);
            border: 1px solid rgba(79,70,229,0.3);
            border-radius: var(--radius);
            padding: 8px 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            flex-shrink: 0;
            align-items: center;
            gap: 10px;
        }
        #opponent-bar.visible { display: flex; animation: fadeIn 0.2s ease; }
        #opponent-bar strong { color: var(--text); }
        .opp-words-badge {
            margin-left: auto;
            background: var(--bg3);
            border-radius: 12px;
            padding: 2px 12px;
            font-size: 0.8rem;
        }

        /* ── Solo: single canvas ── */
        #solo-board {
            position: relative;
            flex: 1;
            min-height: 0;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--bg3);
        }
        #solo-board canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: block;
        }

        /* ── Multiplayer: two boards side by side ── */
        #boards-container {
            display: none;
            flex: 1;
            gap: 8px;
            min-height: 0;
        }
        #boards-container.active { display: flex; }

        .board-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            border: 1px solid var(--bg3);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .board-label {
            background: var(--bg2);
            border-bottom: 1px solid var(--bg3);
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-align: center;
            flex-shrink: 0;
        }
        .board-canvas-wrapper {
            position: relative;
            flex: 1;
            min-height: 0;
        }
        .board-canvas-wrapper canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: block;
        }

        /* ── Win overlay — absolute over entire #game-screen ── */
        .win-overlay {
            position: absolute;
            inset: 0;
            z-index: 50;
            background: rgba(15,23,42,0.88);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            display: none;
        }
        .win-overlay.visible { display: flex; }
        .win-overlay h2 { font-size: 2.2rem; color: var(--green); }
        .win-overlay p  { color: var(--text-muted); font-size: 1.05rem; }
        .win-btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

        /* ── Word input row ── */
        .word-input-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .word-input-row input {
            flex: 1;
            font-size: 1rem;
            padding: 12px 16px;
        }
        .word-input-row .btn { padding: 12px 24px; font-size: 1rem; }

        /* ── Results bar (multiplayer end state) ── */
        #results-bar {
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: var(--radius);
            padding: 16px 24px;
            display: none;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #results-bar.visible { display: flex; animation: slideUp 0.3s ease; }
        #results-verdict { font-size: 1.4rem; font-weight: 800; }
        #results-verdict.victory { color: var(--green); }
        #results-verdict.defeat  { color: var(--red); }
        #results-elo { font-size: 1.1rem; font-weight: 700; }
        .elo-gain { color: var(--green); }
        .elo-loss { color: var(--red); }
        #results-round  { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        #results-series { font-size: 1.15rem; font-weight: 700; letter-spacing: 1px; }

        /* ── Status message ── */
        #status-msg {
            font-size: 0.875rem;
            min-height: 18px;
            text-align: center;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        #status-msg.error   { color: var(--red); }
        #status-msg.success { color: var(--green); }
        #status-msg.info    { color: #a5b4fc; }

        /* ── Hint / skip assist row ── */
        #multi-assist-row {
            display: none;
            gap: 8px;
            flex-shrink: 0;
        }
        #multi-assist-row.visible { display: flex; animation: fadeIn 0.3s ease; }
        #multi-assist-row .btn { flex: 1; font-size: 0.85rem; padding: 8px 12px; }

        /* ── Session win/loss circles ── */
        #session-record {
            position: absolute;
            bottom: 8px; right: 10px;
            z-index: 10;
            display: flex;
            gap: 5px;
            align-items: center;
            pointer-events: none;
        }
        .session-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
        }
        .session-dot--win  { background: var(--green); }
        .session-dot--loss { background: var(--red); }

        /* ── Matchmaking screen ── */
        #matchmaking-screen {
            display: none;
            flex: 1;
            align-items: center;
            justify-content: center;
        }
        #matchmaking-screen.active { display: flex; }
        .match-card {
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 380px;
            width: 100%;
        }
        .match-card h2 { margin-bottom: 8px; }
        .match-card p  { color: var(--text-muted); margin-bottom: 28px; }

        /* ── Game screen ── */
        #game-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 0;
            position: relative; /* win overlay anchors here */
        }
        #game-screen.active {
            display: flex;
        }
    </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
    <span class="navbar-brand">Linxicon</span>
    <div class="navbar-links">
        <span id="mode-badge" class="muted" style="font-size:0.85rem;"></span>
        <button class="btn btn-ghost" id="back-btn" style="padding:6px 14px;">← Lobby</button>
    </div>
</nav>

<!-- ── Matchmaking (multiplayer only) ── -->
<div id="matchmaking-screen">
    <div class="match-card">
        <div class="spinner" style="margin: 0 auto 20px;"></div>
        <h2>Finding a match…</h2>
        <p id="matchmaking-msg">Searching for an opponent at your rating.</p>
        <button class="btn btn-ghost btn-full" id="cancel-search-btn">Cancel</button>
    </div>
</div>

<!-- ── Game screen ── -->
<div id="game-screen">
    <div class="game-wrap">

        <!-- Info bar -->
        <div class="game-info-bar">
            <div class="target-words">
                <span class="word-tag start" id="start-word-tag">—</span>
                <span class="arrow">→</span>
                <span class="word-tag end"   id="end-word-tag">—</span>
            </div>
            <div class="info-right">
                <div class="word-count-pill">Words: <strong id="word-count">2</strong></div>
                <div class="timer" id="timer">0:00</div>
            </div>
        </div>

        <!-- Opponent bar (multiplayer) -->
        <div id="opponent-bar">
            <span>⚔️ vs <strong id="opponent-name">—</strong></span>
            <span class="opp-words-badge">
                Their words: <strong id="opponent-word-count">0</strong>
            </span>
        </div>

        <!-- Solo: single canvas -->
        <div id="solo-board">
            <canvas id="game-canvas"></canvas>
        </div>

        <!-- Multiplayer: two boards side by side -->
        <div id="boards-container">
            <div class="board-panel">
                <div class="board-label">You</div>
                <div class="board-canvas-wrapper">
                    <canvas id="my-canvas"></canvas>
                </div>
            </div>
            <div class="board-panel">
                <div class="board-label" id="opp-board-label">Opponent</div>
                <div class="board-canvas-wrapper">
                    <canvas id="opp-canvas"></canvas>
                </div>
            </div>
        </div>

        <!-- Results bar (multiplayer end state) -->
        <div id="results-bar">
            <div id="results-verdict"></div>
            <div id="results-elo"></div>
            <div id="results-stats"></div>
            <div class="win-btn-row">
                <button class="btn btn-primary" id="rematch-btn">Next Round</button>
                <button class="btn btn-ghost"   id="go-lobby-btn-multi">Lobby</button>
            </div>
        </div>

        <!-- Word input -->
        <div class="word-input-row" id="word-input-row">
            <input type="text" id="word-input"
                   placeholder="Type a connecting word and press Enter…"
                   autocomplete="off" autocorrect="off" spellcheck="false" />
            <button class="btn btn-primary" id="submit-word-btn">Add Word</button>
        </div>

        <!-- Hint / skip assist buttons (multiplayer only, shown after delay) -->
        <div id="multi-assist-row">
            <button class="btn btn-ghost" id="hint-btn">
                💡 Request Hint <span id="hint-waiting" style="opacity:0.6;font-size:0.8em;"></span>
            </button>
            <button class="btn btn-ghost" id="skip-btn">
                ⏭ Skip Pair <span id="skip-waiting" style="opacity:0.6;font-size:0.8em;"></span>
            </button>
        </div>

        <!-- Status message -->
        <div id="status-msg"></div>

    </div>

    <!-- Session win/loss circles (bottom-right, multiplayer) -->
    <div id="session-record"></div>

    <!-- Win overlay floats over the whole game screen -->
    <div class="win-overlay" id="win-overlay">
        <h2 id="win-title">You connected them! 🎉</h2>
        <p  id="win-details"></p>
        <div class="win-btn-row">
            <button class="btn btn-success" id="play-again-btn">Play Again</button>
            <button class="btn btn-ghost"   id="go-lobby-btn">Lobby</button>
        </div>
    </div>
</div>

<script type="module">
    import { requireAuth }                    from "./js/auth.js";
    import { getEngine }                      from "./js/glove.js";
    import { initDownloadManager,
             awaitEmbeddings }                from "./js/download-manager.js";
    import { Graph }                from "./js/graph.js";
    import { Renderer }             from "./js/render.js";
    import { GameSession }          from "./js/game.js";
    import { MultiplayerSession }   from "./js/multiplayer.js";
    import { calcEloDelta }         from "./js/account.js";
    import { initGameConfig,
             getConfig, onConfigChange }      from "./js/game-config.js";

    // ── Mode from URL ──
    const params = new URLSearchParams(window.location.search);
    const mode   = params.get("mode") === "multi" ? "multi" : "solo";
    document.getElementById("mode-badge").textContent =
        mode === "multi" ? "⚔️ Multiplayer" : "🧩 Solo";

    // ── Auth guard ──
    await requireAuth();

    // ── Load Firebase game config (adaptiveK, pairVocabLimit, etc.) ──
    initGameConfig();

    // ── Show loading screen and await embeddings ──
    document.getElementById("matchmaking-screen").classList.add("active");
    document.getElementById("matchmaking-msg").textContent = "Preparing word engine…";
    initDownloadManager();

    let embeddingsOk = true;
    try {
        await awaitEmbeddings();
    } catch (err) {
        embeddingsOk = false;
        if (err?.message === 'embeddings-declined') {
            document.getElementById("matchmaking-msg").textContent =
                "Download required to play — refresh and accept the download prompt.";
        } else {
            document.getElementById("matchmaking-msg").textContent =
                "Failed to load word engine — is game/data/embeddings.bin present?";
            console.error("[game.html] awaitEmbeddings failed:", err);
        }
    }

    if (embeddingsOk) { await (async () => { // ── game init (skipped if embeddings failed) ──

    // Apply Firebase config to engine (K can change live without a redeploy)
    const _applyConfig = ({ adaptiveK }) => getEngine()?.setAdaptiveK(adaptiveK);
    _applyConfig(getConfig());
    onConfigChange(_applyConfig);

    // Hide the panel that doesn't apply to this mode
    if (mode === "solo") {
        document.getElementById("boards-container").style.display = "none";
    } else {
        document.getElementById("solo-board").style.display = "none";
    }

    // ── Canvas sync ──
    function syncCanvasSize() {
        if (mode === "solo") {
            const c = document.getElementById("game-canvas");
            const w = c.parentElement.clientWidth;
            const h = c.parentElement.clientHeight;
            if (w > 0 && h > 0 && (c.width !== w || c.height !== h)) {
                c.width = w; c.height = h;
            }
        } else {
            for (const id of ["my-canvas", "opp-canvas"]) {
                const c = document.getElementById(id);
                const w = c.parentElement.clientWidth;
                const h = c.parentElement.clientHeight;
                if (w > 0 && h > 0 && (c.width !== w || c.height !== h)) {
                    c.width = w; c.height = h;
                }
            }
        }
    }
    window.addEventListener("resize", syncCanvasSize);

    // ── UI helpers ──
    function setStatus(text, type = "") {
        const el = document.getElementById("status-msg");
        el.textContent = text;
        el.className   = type;
    }

    function refreshWordCount() {
        document.getElementById("word-count").textContent =
            gameSession.graph.wordCount;
    }

    let timerInterval = null;
    let timerSeconds  = 0;

    function startTimer() {
        timerSeconds = 0;
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timerSeconds++;
            const m = Math.floor(timerSeconds / 60);
            const s = String(timerSeconds % 60).padStart(2, "0");
            document.getElementById("timer").textContent = `${m}:${s}`;
        }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); }
    function fmtTime(s) {
        return s < 60 ? `${s}s` : `${Math.floor(s / 60)}m ${s % 60}s`;
    }

    function showOverlay(title, details) {
        stopTimer();
        document.getElementById("win-title").textContent   = title;
        document.getElementById("win-details").textContent = details;
        document.getElementById("win-overlay").classList.add("visible");
    }

    function showGameScreen() {
        document.getElementById("matchmaking-screen").classList.remove("active");
        document.getElementById("game-screen").classList.add("active");
        if (mode !== "solo") {
            document.getElementById("boards-container").classList.add("active");
        }
        requestAnimationFrame(syncCanvasSize);
    }

    // ── Word submission (shared by both modes) ──
    let gameSession;
    let activeSubmit;

    async function handleSubmit() {
        const input = document.getElementById("word-input");
        const word  = input.value.trim();
        input.value = "";
        input.focus();
        if (!word) return;

        const result = await activeSubmit(word);

        if (result.error) { setStatus(result.error, "error"); return; }

        refreshWordCount();

        if (result.connections.length === 0) {
            setStatus(`"${result.added}" added — no connections yet.`);
        } else {
            setStatus(
                `"${result.added}" links to: ${result.connections.join(", ")}`,
                "success"
            );
        }
    }

    document.getElementById("submit-word-btn")
        .addEventListener("click", handleSubmit);
    document.getElementById("word-input")
        .addEventListener("keydown", (e) => { if (e.key === "Enter") handleSubmit(); });

    // ══════════════════════════════════════════════
    // SOLO MODE
    // ══════════════════════════════════════════════
    if (mode === "solo") {
        const canvas   = document.getElementById("game-canvas");
        const renderer = new Renderer(canvas, new Graph());

        showGameScreen();

        gameSession = new GameSession(
            canvas, renderer,
            async (wordsAdded, solveTime) => {
                showOverlay(
                    "You connected them! 🎉",
                    `${wordsAdded} word${wordsAdded !== 1 ? "s" : ""} · ${fmtTime(solveTime)}`
                );
                await gameSession.saveResult(true, null);
            },
            (msg) => setStatus(msg, "info")
        );

        activeSubmit = (w) => gameSession.submitWord(w);

        window.addEventListener("beforeunload", () => {
            renderer.stop();
            stopTimer();
        });

        const { startWord, endWord } = gameSession.init();
        document.getElementById("start-word-tag").textContent = startWord;
        document.getElementById("end-word-tag").textContent   = endWord;
        startTimer();

    // ══════════════════════════════════════════════
    // MULTIPLAYER MODE
    // ══════════════════════════════════════════════
    } else {
        document.getElementById("matchmaking-screen").classList.add("active");

        // ── My board (managed by GameSession) ──
        const myCanvas   = document.getElementById("my-canvas");
        const myRenderer = new Renderer(myCanvas, new Graph());

        // ── Opponent board (managed manually with hidden labels) ──
        const oppCanvas   = document.getElementById("opp-canvas");
        const oppGraph    = new Graph();
        const oppRenderer = new Renderer(oppCanvas, oppGraph);
        oppRenderer.hideLabels = true; // opponent nodes show "?" to hide their strategy

        let oppBoardState = null;
        let oppWordCount  = 0;

        // GameSession onWin is a no-op — MultiplayerSession drives the win flow
        gameSession = new GameSession(
            myCanvas, myRenderer,
            () => {},
            (msg) => setStatus(msg, "info")
        );

        let rematchClicked  = false;
        const sessionResults = []; // win/loss history for current session (never resets)
        let hintTimerId     = null;
        let skipTimerId     = null;
        let hintRequested   = false;
        let skipRequested   = false;

        function showMultiResults(won, eloChange, wordsUsed, solveTime) {
            stopTimer();
            document.getElementById("word-input-row").style.display = "none";

            // Re-trigger slide-up animation even if bar was previously shown
            const bar = document.getElementById("results-bar");
            bar.classList.remove("visible");
            bar.offsetHeight; // force reflow
            bar.classList.add("visible");

            const verdict = document.getElementById("results-verdict");
            verdict.textContent = won ? "Victory" : "Defeat";
            verdict.className   = won ? "victory" : "defeat";

            const eloEl = document.getElementById("results-elo");
            const sign  = eloChange >= 0 ? "+" : "";
            const cls   = eloChange >= 0 ? "elo-gain" : "elo-loss";
            eloEl.innerHTML = `<span class="${cls}">${sign}${eloChange} ELO</span>`;

            document.getElementById("results-stats").textContent =
                `${wordsUsed} word${wordsUsed !== 1 ? "s" : ""} · ${fmtTime(solveTime)}`;

            const btn = document.getElementById("rematch-btn");
            btn.textContent = "Next Round";
            btn.disabled    = false;
        }

        const multiSession = new MultiplayerSession(
            myRenderer,
            gameSession,

            // onMatchFound — _initLocalBoard already called gameSession.initWords()
            ({ startWord, endWord, opponentName }) => {
                const sw = startWord.toLowerCase();
                const ew = endWord.toLowerCase();

                oppRenderer.hideLabels = true; // re-hide for each new round

                // Reset results bar from any previous round
                document.getElementById("results-bar").classList.remove("visible");
                document.getElementById("word-input-row").style.display = "";
                rematchClicked = false;

                // Initialise opponent board state and graph
                const engine = getEngine();
                oppBoardState = engine.createGame(sw, ew);
                oppWordCount = 0;
                oppGraph.nodes.clear();
                oppGraph.addNode(sw, []);
                oppGraph.addNode(ew, []);
                oppRenderer.setStartEnd(sw, ew);
                oppRenderer.setWinningPath(null);
                oppRenderer.start();

                // Update UI
                document.getElementById("start-word-tag").textContent = sw;
                document.getElementById("end-word-tag").textContent   = ew;
                document.getElementById("opponent-bar").classList.add("visible");
                document.getElementById("opponent-name").textContent  = opponentName;
                document.getElementById("opp-board-label").textContent = opponentName;

                // Reset assist buttons for new round
                hintRequested = false;
                skipRequested = false;
                document.getElementById("multi-assist-row").classList.remove("visible");
                document.getElementById("hint-btn").disabled  = false;
                document.getElementById("skip-btn").disabled  = false;
                document.getElementById("hint-waiting").textContent = "";
                document.getElementById("skip-waiting").textContent = "";
                clearTimeout(hintTimerId);
                clearTimeout(skipTimerId);

                showGameScreen();
                refreshWordCount();
                startTimer();
                setStatus(`Connect "${sw}" → "${ew}"`);

                // After 15 s: show hint button if a start/end word is still isolated
                hintTimerId = setTimeout(() => {
                    const state = gameSession.boardState;
                    if (!state) return;
                    const isolated = [sw, ew].some(w => {
                        const idx = state.words.indexOf(w);
                        return idx >= 0 && !state.edges.some(([i, j]) => i === idx || j === idx);
                    });
                    if (isolated && !multiSession.finished) {
                        document.getElementById("hint-btn").style.display = "";
                        document.getElementById("multi-assist-row").classList.add("visible");
                    }
                }, 15_000);

                // After 30 s: always show skip button
                skipTimerId = setTimeout(() => {
                    if (!multiSession.finished) {
                        document.getElementById("skip-btn").style.display = "";
                        document.getElementById("multi-assist-row").classList.add("visible");
                    }
                }, 30_000);
            },

            // onOpponentWord — apply to opponent's board and graph
            (word) => {
                if (!oppBoardState) return;
                const engine = getEngine();
                const { state: newState, result } = engine.addWord(oppBoardState, word);
                if (!result.accepted) return;

                oppBoardState = newState;
                oppWordCount++;

                const connections = result.newEdges.map(([a, b]) => a === word ? b : a);
                oppGraph.addNode(word, connections);

                document.getElementById("opponent-word-count").textContent = oppWordCount;
                setStatus("Opponent played a word", "info");
            },

            // onGameOver
            async ({ won, opponentElo, myElo, abandoned }) => {
                clearTimeout(hintTimerId);
                clearTimeout(skipTimerId);
                document.getElementById("multi-assist-row").classList.remove("visible");

                // Update session win/loss circles
                sessionResults.push(won);
                const recEl = document.getElementById("session-record");
                recEl.innerHTML = sessionResults.map(w =>
                    `<span class="session-dot session-dot--${w ? 'win' : 'loss'}"></span>`
                ).join("");

                const eloChange = calcEloDelta(myElo, opponentElo, won);

                // Reveal opponent's word labels now that the game is over
                oppRenderer.hideLabels = false;

                if (!won) {
                    const engine = getEngine();
                    const path   = engine.shortestPath(oppBoardState);
                    if (path) oppRenderer.setWinningPath(path);
                    if (!abandoned) {
                        await gameSession.saveResult(false, opponentElo, {
                            opponentUid:      multiSession.opponentUid      ?? "",
                            opponentUsername: multiSession.opponentUsername ?? "",
                        });
                    }
                }

                if (abandoned) {
                    setStatus(won ? "Opponent disconnected — you win!" : "You disconnected", "info");
                }

                showMultiResults(won, eloChange, gameSession.wordsAdded, gameSession.getElapsed());
            },

            // onMessage (matchmaking status)
            (msg) => {
                document.getElementById("matchmaking-msg").textContent = msg;
            },

            // onRematchRequested — opponent clicked Next Round first
            () => {
                const btn = document.getElementById("rematch-btn");
                btn.textContent = "Accept Next Round";
                btn.disabled    = false;
            },

            // onHintGranted — auto-submit the hint word onto the player's board
            async (word, _connectedTo) => {
                document.getElementById("hint-btn").disabled = true;
                document.getElementById("hint-waiting").textContent = "";
                const result = await activeSubmit(word);
                if (!result?.error) {
                    refreshWordCount();
                    setStatus(
                        result?.connections?.length
                            ? `💡 Hint "${word}" added — links to: ${result.connections.join(", ")}`
                            : `💡 Hint "${word}" added to board`,
                        "info"
                    );
                }
            },

            // onSkipGranted — both players agreed to skip this pair (handled via _startRematch → onMatchFound)
            () => {
                setStatus("Pair skipped — new words incoming…", "info");
            }
        );

        activeSubmit = (w) => multiSession.submitWord(w);
        multiSession.findMatch();

        document.getElementById("cancel-search-btn")
            .addEventListener("click", async () => {
                await multiSession.cancelSearch();
                window.location.href = "lobby.html";
            });

        document.getElementById("rematch-btn")
            .addEventListener("click", async () => {
                if (rematchClicked) return;
                rematchClicked = true;
                const btn = document.getElementById("rematch-btn");
                btn.textContent = "Waiting…";
                btn.disabled    = true;
                await multiSession.requestRematch();
            });

        document.getElementById("hint-btn")
            .addEventListener("click", async () => {
                if (hintRequested) return;
                hintRequested = true;
                document.getElementById("hint-waiting").textContent = "(waiting for opponent…)";
                document.getElementById("hint-btn").disabled = true;
                await multiSession.requestHint();
            });

        document.getElementById("skip-btn")
            .addEventListener("click", async () => {
                if (skipRequested) return;
                skipRequested = true;
                document.getElementById("skip-waiting").textContent = "(waiting for opponent…)";
                document.getElementById("skip-btn").disabled = true;
                await multiSession.requestSkipPair();
            });

        document.getElementById("go-lobby-btn-multi")
            .addEventListener("click", () => { window.location.href = "lobby.html"; });

        window.addEventListener("beforeunload", () => {
            multiSession.cleanup();
            myRenderer.stop();
            oppRenderer.stop();
            stopTimer();
        });
    }

    // ── Navigation ──
    document.getElementById("back-btn")
        .addEventListener("click", () => { window.location.href = "lobby.html"; });
    document.getElementById("go-lobby-btn")
        .addEventListener("click", () => { window.location.href = "lobby.html"; });
    document.getElementById("play-again-btn")
        .addEventListener("click", () => { window.location.reload(); });

    })(); } // end game-init IIFE
</script>
</body>
</html>

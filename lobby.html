<!DOCTYPE html>
<!-- ============================================================
     lobby.html
     Main hub after login. Player can:
       - Start a solo game
       - Find a multiplayer match
       - View their stats
       - Log out
     ============================================================ -->
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linxicon — Lobby</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .lobby-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            max-width: 700px;
            width: 100%;
            margin-top: 32px;
        }
        .lobby-card {
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: var(--radius);
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color var(--transition), transform var(--transition);
        }
        .lobby-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .lobby-card .icon { font-size: 2.4rem; margin-bottom: 10px; }
        .lobby-card h3    { margin-bottom: 6px; }
        .lobby-card p     { font-size: 0.85rem; color: var(--text-muted); }

        .elo-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.9rem;
            color: var(--gold);
            font-weight: 600;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<!-- Nav -->
<nav class="navbar">
    <span class="navbar-brand">Linxicon</span>
    <div class="navbar-links">
        <span id="nav-username" class="muted"></span>
        <button class="btn btn-ghost" id="logout-btn">Log Out</button>
    </div>
</nav>

<div class="page-center">
    <div style="text-align:center;">
        <h2>Welcome back, <span id="welcome-name">Player</span></h2>
        <div class="elo-badge">⭐ Elo: <span id="welcome-elo">—</span></div>
    </div>

    <!-- Main menu cards -->
    <div class="lobby-grid">

        <div class="lobby-card" id="btn-solo">
            <div class="icon">🧩</div>
            <h3>Solo Game</h3>
            <p>Practice connecting words at your own pace.</p>
        </div>

        <div class="lobby-card" id="btn-multi">
            <div class="icon">⚔️</div>
            <h3>Multiplayer</h3>
            <p>Race against a matched opponent in real time.</p>
        </div>

        <div class="lobby-card" id="btn-stats">
            <div class="icon">📊</div>
            <h3>My Stats</h3>
            <p>View your performance and match history.</p>
        </div>

    </div>
</div>

<script type="module">
    import { requireAuth, logout }  from "./js/auth.js";
    import { loadAccount }          from "./js/account.js";

    // Redirect to login if not signed in
    const user    = await requireAuth();
    const account = await loadAccount(user.uid);

    if (account) {
        document.getElementById("welcome-name").textContent = account.username;
        document.getElementById("welcome-elo").textContent  = account.elo;
        document.getElementById("nav-username").textContent = account.username;
    }

    document.getElementById("btn-solo").addEventListener("click", () => {
        window.location.href = "game.html?mode=solo";
    });

    document.getElementById("btn-multi").addEventListener("click", () => {
        window.location.href = "game.html?mode=multi";
    });

    document.getElementById("btn-stats").addEventListener("click", () => {
        window.location.href = "stats.html";
    });

    document.getElementById("logout-btn").addEventListener("click", async () => {
        await logout();
    });
</script>
<!-- ============================================================
     TEMPORARY DIAGNOSTIC — remove once DB is confirmed working
     Paste this block just before </body> in index.html
     Open browser console, log in, then click "Run DB Test"
     ============================================================ -->
<div id="db-test-ui" style="
    position:fixed; bottom:16px; right:16px;
    background:#1e293b; border:1px solid #334155;
    border-radius:10px; padding:16px; z-index:9999;
    font-family:monospace; font-size:12px; color:#f1f5f9;
    max-width:340px;">
    <div style="font-weight:700; margin-bottom:8px;">🔧 DB Diagnostic</div>
    <div id="db-test-log" style="
        background:#0f172a; border-radius:6px; padding:8px;
        min-height:80px; max-height:200px; overflow-y:auto;
        margin-bottom:10px; white-space:pre-wrap; font-size:11px;
        color:#94a3b8;">Waiting…</div>
    <button onclick="runDbTest()" style="
        background:#4f46e5; color:#fff; border:none;
        border-radius:6px; padding:7px 14px; cursor:pointer;
        font-size:12px; margin-right:6px;">Run DB Test</button>
    <button onclick="document.getElementById('db-test-ui').remove()" style="
        background:#334155; color:#f1f5f9; border:none;
        border-radius:6px; padding:7px 14px; cursor:pointer;
        font-size:12px;">Close</button>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, get, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const log = (msg, color = "#94a3b8") => {
    console.log("[DB-TEST]", msg);
    const el = document.getElementById("db-test-log");
    if (el) {
        el.innerHTML += `<span style="color:${color}">${msg}\n</span>`;
        el.scrollTop = el.scrollHeight;
    }
};

window.runDbTest = async () => {
    const el = document.getElementById("db-test-log");
    if (el) el.innerHTML = "";

    // ── 1. Check Firebase app is initialised ──
    const apps = getApps();
    log(`Firebase apps initialised: ${apps.length}`);
    if (apps.length === 0) { log("❌ No Firebase app — config not loaded", "#ef4444"); return; }

    const app = apps[0];
    log(`App name: ${app.name}`);
    log(`Project:  ${app.options.projectId}`);
    log(`DB URL:   ${app.options.databaseURL ?? "MISSING ← THIS IS THE PROBLEM"}`,
        app.options.databaseURL ? "#94a3b8" : "#ef4444");

    if (!app.options.databaseURL) {
        log("❌ databaseURL is missing from firebase-config.js", "#ef4444");
        log("Add: databaseURL: 'https://linxzicon-e4d76-default-rtdb.firebaseio.com'", "#f59e0b");
        return;
    }

    const auth = getAuth(app);
    const db   = getDatabase(app);

    // ── 2. Check auth state ──
    const user = auth.currentUser;
    if (!user) {
        log("⚠️  Not logged in — log in first then click Run DB Test", "#f59e0b");
        return;
    }
    log(`Auth user: ${user.uid}`, "#10b981");
    log(`Email:     ${user.email}`, "#10b981");

    // ── 3. Try a test write ──
    const testRef = ref(db, `_dbtest/${user.uid}`);
    log("Writing test node to /_dbtest/…");
    try {
        await set(testRef, { ts: Date.now(), uid: user.uid });
        log("✅ Write succeeded", "#10b981");
    } catch (err) {
        log(`❌ Write FAILED: ${err.code} — ${err.message}`, "#ef4444");
        if (err.code === "PERMISSION_DENIED") {
            log("→ Rules are blocking writes. Go to Firebase console", "#f59e0b");
            log("  Realtime DB → Rules → publish:", "#f59e0b");
            log('  { "rules": { ".read": "auth != null", ".write": "auth != null" } }', "#f59e0b");
        }
        return;
    }

    // ── 4. Try a test read ──
    log("Reading back test node…");
    try {
        const snap = await get(testRef);
        log(`✅ Read succeeded, exists: ${snap.exists()}`, "#10b981");
        if (snap.exists()) log(`   val: ${JSON.stringify(snap.val())}`, "#10b981");
    } catch (err) {
        log(`❌ Read FAILED: ${err.code} — ${err.message}`, "#ef4444");
        return;
    }

    // ── 5. Check if user profile exists ──
    log(`Checking /users/${user.uid}…`);
    try {
        const userSnap = await get(ref(db, `users/${user.uid}`));
        if (userSnap.exists()) {
            log("✅ User profile exists:", "#10b981");
            log("   " + JSON.stringify(userSnap.val()).slice(0, 200), "#10b981");
        } else {
            log("⚠️  No user profile found — registration write may have failed", "#f59e0b");
            log("Writing a fresh profile now…", "#f59e0b");
            try {
                await set(ref(db, `users/${user.uid}`), {
                    uid:           user.uid,
                    username:      user.email.split("@")[0],
                    email:         user.email,
                    elo:           1000,
                    soloPlayed:    0, soloWon: 0, soloAvgWords: 0,
                    soloAvgTime:   0, soloBestTime: 0,
                    multiPlayed:   0, multiWon: 0, multiLost: 0,
                    multiAvgWords: 0, multiAvgTime: 0,
                    winStreak:     0, currentStreak: 0,
                });
                log("✅ Profile written — reload the stats page", "#10b981");
            } catch (err2) {
                log(`❌ Profile write FAILED: ${err2.message}`, "#ef4444");
            }
        }
    } catch (err) {
        log(`❌ User profile read FAILED: ${err.message}`, "#ef4444");
    }

    // ── 6. Clean up test node ──
    try { await remove(testRef); log("Test node cleaned up"); } catch (_) {}

    log("── Done ──", "#a5b4fc");
};
</script>
</body>
</html>

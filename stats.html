<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linxicon — My Stats</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .stats-page {
            max-width: 960px;
            margin: 0 auto;
            padding: 28px 20px 60px;
        }
        .section-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 36px 0 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--bg3);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px;
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: var(--radius);
            margin-bottom: 4px;
        }
        .profile-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.25);
        }
        .profile-info h2 { font-size: 1.5rem; margin-bottom: 4px; }
        .elo-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(245,158,11,0.12);
            border: 1px solid rgba(245,158,11,0.35);
            border-radius: 20px;
            padding: 4px 14px;
            color: var(--gold);
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* Stat grids */
        .stats-grid-5 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        .stats-grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: var(--radius);
            padding: 20px 16px;
            text-align: center;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.1;
        }
        .stat-card .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* History */
        #history-container {
            background: var(--bg2);
            border: 1px solid var(--bg3);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .history-table th {
            text-align: left;
            padding: 12px 16px;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid var(--bg3);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .history-table td { padding: 11px 16px; border-bottom: 1px solid var(--bg3); }
        .history-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .row-win  td:first-child { border-left: 3px solid var(--green); }
        .row-loss td:first-child { border-left: 3px solid var(--red); }
        .result-win  { color: var(--green); font-weight: 600; }
        .result-loss { color: var(--red);   font-weight: 600; }
        .no-history { color: var(--text-muted); padding: 32px; text-align: center; }

        .mode-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .mode-solo  { background: rgba(79,70,229,0.2);  color: #a5b4fc; }
        .mode-multiplayer { background: rgba(245,158,11,0.15); color: var(--gold); }

        @media (max-width: 700px) {
            .stats-grid-5 { grid-template-columns: repeat(2, 1fr); }
            .stats-grid-4 { grid-template-columns: repeat(2, 1fr); }
        }

        /* entrance animations */
        .profile-header { animation: fadeInDown 0.3s ease both; }
        .history-table tbody tr { transition: background 0.15s ease; }
        .stat-card { animation: slideUp 0.3s ease both; }
        .stats-grid-5 .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stats-grid-5 .stat-card:nth-child(2) { animation-delay: 0.1s;  }
        .stats-grid-5 .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stats-grid-5 .stat-card:nth-child(4) { animation-delay: 0.2s;  }
        .stats-grid-5 .stat-card:nth-child(5) { animation-delay: 0.25s; }
        .stats-grid-4 .stat-card:nth-child(1) { animation-delay: 0.1s;  }
        .stats-grid-4 .stat-card:nth-child(2) { animation-delay: 0.17s; }
        .stats-grid-4 .stat-card:nth-child(3) { animation-delay: 0.24s; }
        .stats-grid-4 .stat-card:nth-child(4) { animation-delay: 0.31s; }
        .stats-grid-4 .stat-card:nth-child(5) { animation-delay: 0.38s; }
        .stats-grid-4 .stat-card:nth-child(6) { animation-delay: 0.45s; }
        .stats-grid-4 .stat-card:nth-child(7) { animation-delay: 0.52s; }
        .stats-grid-4 .stat-card:nth-child(8) { animation-delay: 0.59s; }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="navbar-brand">Linxicon</span>
    <div class="navbar-links">
        <a href="lobby.html" class="btn btn-ghost">← Lobby</a>
    </div>
</nav>

<div class="stats-page">

    <!-- Profile header -->
    <div class="profile-header">
        <div class="profile-avatar" id="avatar-letter">?</div>
        <div class="profile-info">
            <h2 id="stat-username">Loading…</h2>
            <div class="elo-pill">⭐ Elo <span id="stat-elo">—</span></div>
        </div>
    </div>

    <!-- ── Solo Stats ── -->
    <p class="section-title">🧩 Solo</p>
    <div class="stats-grid-5">
        <div class="stat-card">
            <div class="stat-value" id="stat-solo-played">—</div>
            <div class="stat-label">Games Played</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-solo-won" style="color:var(--green)">—</div>
            <div class="stat-label">Solved</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-solo-avg-words">—</div>
            <div class="stat-label">Avg Words</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-solo-avg-time">—</div>
            <div class="stat-label">Avg Time</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-solo-best-time" style="color:var(--gold)">—</div>
            <div class="stat-label">Best Time</div>
        </div>
    </div>

    <!-- ── Multiplayer Stats ── -->
    <p class="section-title">⚔️ Multiplayer</p>
    <div class="stats-grid-4">
        <div class="stat-card">
            <div class="stat-value" id="stat-multi-played">—</div>
            <div class="stat-label">Games Played</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-multi-won" style="color:var(--green)">—</div>
            <div class="stat-label">Wins</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-multi-lost" style="color:var(--red)">—</div>
            <div class="stat-label">Losses</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-multi-winrate">—</div>
            <div class="stat-label">Win Rate</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-multi-avg-words">—</div>
            <div class="stat-label">Avg Words</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-multi-avg-time">—</div>
            <div class="stat-label">Avg Time</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-multi-streak" style="color:var(--gold)">—</div>
            <div class="stat-label">Best Streak</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-multi-cur-streak">—</div>
            <div class="stat-label">Current Streak</div>
        </div>
    </div>

    <!-- ── History ── -->
    <p class="section-title">📋 Recent Matches (last 20)</p>
    <div id="history-container">
        <p class="no-history">Loading…</p>
    </div>

</div>

<script type="module">
    import { requireAuth } from "./js/auth.js";
    import { loadAccount } from "./js/account.js";
    import { loadStats }   from "./js/stats.js";

    const user    = await requireAuth();
    const account = await loadAccount(user.uid);

    if (account) {
        document.getElementById("avatar-letter").textContent =
            account.username.charAt(0).toUpperCase();
    }

    await loadStats(user.uid, account);
</script>
</body>
</html>
